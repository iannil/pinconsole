root = "."
testdata_dir = "testdata"
tmp_dir = ".tmp"

[build]
cmd = "go build -o ./bin/server-dev -tags dev ./cmd/server"
bin = "./bin/server-dev"
full_bin = ""
include_ext = ["go", "tpl", "tmpl", "html", "yaml", "yml", "toml", "json", "env"]
exclude_dir = ["bin", "migrations", "embedded", ".tmp"]
include_dir = []
exclude_file = []
delay = 500
stop_on_error = true
send_interrupt = true
kill_delay = 3000

[log]
time = false
color = "auto"

[color]
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[misc]
clean_on_exit = true
