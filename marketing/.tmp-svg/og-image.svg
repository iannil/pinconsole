      <stop offset="0%" stop-color="#10B981" stop-opacity="0.08" />
      <stop offset="60%" stop-color="#10B981" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#08090A" />
      <stop offset="100%" stop-color="#050607" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#spotlight)" />

  <!-- Top strip -->
  <g transform="translate(80, 56)">
