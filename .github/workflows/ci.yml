name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===== Go =====
  go-check:
    name: Go lint + test + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: server/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61
          working-directory: server

      - name: go test (dev build)
        run: go test -race -cover -count=1 ./...

      - name: go test (release build tags)
        run: go test -race -count=1 -tags release ./internal/api/... ./internal/config/... ./cmd/server/...

      - name: go build (dev)
        run: go build -tags dev -o /tmp/server-dev ./cmd/server

  # ===== Frontend =====
  js-check:
    name: JS lint + test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint:js

      - name: Test
        run: pnpm test:js

      - name: Build admin
        run: pnpm --filter @marketing-monitor/admin build

      - name: Build SDK
        run: pnpm --filter @marketing-monitor/visitor-sdk build

      - name: Verify Go release build (embeds frontend)
        run: |
          mkdir -p server/cmd/server/embedded/{admin,sdk,landing}
          cp -r admin/dist/* server/cmd/server/embedded/admin/
          cp -r visitor-sdk/dist/* server/cmd/server/embedded/sdk/
          cp -r landing/* server/cmd/server/embedded/landing/
          cd server && go build -tags release -o /tmp/server-release ./cmd/server

  # ===== Markdown / docs =====
  docs-check:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: pnpm install markdownlint-cli --no-frozen-lockfile

      - run: pnpm lint:md

  # ===== Docker build =====
  docker-build:
    name: Docker image build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: false
          tags: marketing-monitor:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===== Compose smoke =====
  compose-smoke:
    name: docker-compose smoke + migrations
    runs-on: ubuntu-latest
    needs: [go-check, js-check]
    steps:
      - uses: actions/checkout@v4

      - name: 启动 infra
        run: docker compose up -d postgres redis minio

      - name: 等待 healthy
        run: |
          for i in {1..30}; do
            status=$(docker compose ps --format json | jq -r '.[] | select(.Service != "server") | .Health' | sort -u)
            if [ "$status" = "healthy" ]; then exit 0; fi
            sleep 2
          done
          echo "infra 未就绪"
          docker compose ps
          exit 1

      - name: 应用全部 migrations (验证 down/up 干净循环)
        env:
          MM_ALLOW_DESTRUCTIVE_MIGRATE: "1"
        run: |
          # 应用 up
          for f in server/migrations/*.up.sql; do
            docker compose exec -T postgres psql -U mm -d marketing_monitor -f /dev/stdin < "$f"
          done
          # 验证 schema_migrations 表不存在（手动 psql -f 模式）
          docker compose exec -T postgres psql -U mm -d marketing_monitor -c '\dt' | grep -E 'sessions|visitors|users|chat_messages|co_browsing_commands|event_blobs'
          # 跑一遍 down(逃生门已设)
          for f in $(ls server/migrations/*.down.sql | tac); do
            docker compose exec -T postgres psql -U mm -d marketing_monitor -f /dev/stdin < "$f"
          done
          # 再跑 up,验证可重放
          for f in server/migrations/*.up.sql; do
            docker compose exec -T postgres psql -U mm -d marketing_monitor -f /dev/stdin < "$f"
          done
          # 再次验证表存在
          docker compose exec -T postgres psql -U mm -d marketing_monitor -c '\dt' | grep -E 'sessions|visitors|users'

      - name: 验证 server 启动自动应用 migrations (1k P0-14)
        env:
          SERVER_ENV: dev
          ADMIN_EMAIL: ci-admin@test.local
          ADMIN_PASSWORD: ci-strong-password-123
          PG_PASSWORD: mm_dev
          MINIO_ACCESS_KEY: mm_dev
          MINIO_SECRET_KEY: mm_dev_secret
        run: |
          # 重置 DB (模拟 fresh DB)
          docker compose exec -T postgres psql -U mm -d marketing_monitor -c "DROP SCHEMA public CASCADE; CREATE SCHEMA public;"
          # 构建 dev binary
          cd server && go build -tags dev -o /tmp/mm-server ./cmd/server
          # 启动 server (后台),应自动跑 migrations 创建表
          /tmp/mm-server &
          SERVER_PID=$!
          sleep 5
          # 验证表存在
          docker compose exec -T postgres psql -U mm -d marketing_monitor -c '\dt' | grep -E 'sessions|visitors|users|schema_migrations'
          # 验证 schema_migrations 表记录数 = migrations 数
          COUNT=$(docker compose exec -T postgres psql -U mm -d marketing_monitor -t -c "SELECT COUNT(*) FROM schema_migrations")
          if [ "$COUNT" -lt "4" ]; then
            echo "schema_migrations 记录数 $COUNT < 4,失败"
            kill $SERVER_PID || true
            exit 1
          fi
          kill $SERVER_PID 2>/dev/null || true
          wait $SERVER_PID 2>/dev/null || true

      - name: 清理
        if: always()
        run: docker compose down -v
