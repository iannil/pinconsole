name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===== Go =====
  go-check:
    name: Go lint + test + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: server/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61
          working-directory: server

      - name: go test (dev build)
        run: go test -race -cover -count=1 ./...

      - name: go test (release build tags)
        run: go test -race -count=1 -tags release ./internal/api/... ./internal/config/... ./cmd/server/...

      - name: go build (dev)
        run: go build -tags dev -o /tmp/server-dev ./cmd/server

  # ===== Frontend =====
  js-check:
    name: JS lint + test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint:js

      - name: Test
        run: pnpm test:js

      - name: Build admin
        run: pnpm --filter @pinconsole/admin build

      - name: Build SDK
        run: pnpm --filter @pinconsole/visitor-sdk build

      - name: Verify Go release build (embeds frontend)
        run: |
          mkdir -p server/cmd/server/embedded/{admin,sdk,landing}
          cp -r admin/dist/* server/cmd/server/embedded/admin/
          cp -r visitor-sdk/dist/* server/cmd/server/embedded/sdk/
          cp -r landing/* server/cmd/server/embedded/landing/
          cd server && go build -tags release -o /tmp/server-release ./cmd/server

  # ===== Markdown / docs =====
  docs-check:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: pnpm install markdownlint-cli --no-frozen-lockfile

      - run: pnpm lint:md

  # ===== Docker build =====
  docker-build:
    name: Docker image build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: false
          tags: pinconsole:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===== Compose smoke =====
  compose-smoke:
    name: docker-compose smoke + migrations
    runs-on: ubuntu-latest
    needs: [go-check, js-check]
    steps:
      - uses: actions/checkout@v4

      - name: 启动 infra
        run: docker compose up -d postgres redis minio

      - name: 等待 healthy
        run: |
          for i in {1..30}; do
            status=$(docker compose ps --format json | jq -r '.[] | select(.Service != "server") | .Health' | sort -u)
            if [ "$status" = "healthy" ]; then exit 0; fi
            sleep 2
          done
          echo "infra 未就绪"
          docker compose ps
          exit 1

      - name: 应用全部 migrations (验证 down/up 干净循环)
        env:
          MM_ALLOW_DESTRUCTIVE_MIGRATE: "1"
        run: |
          # 应用 up
          for f in server/migrations/*.up.sql; do
            docker compose exec -T postgres psql -U mm -d pinconsole -f /dev/stdin < "$f"
          done
          # 验证 schema_migrations 表不存在（手动 psql -f 模式）
          docker compose exec -T postgres psql -U mm -d pinconsole -c '\dt' | grep -E 'sessions|visitors|users|chat_messages|co_browsing_commands|event_blobs'
          # 跑一遍 down(逃生门已设)
          for f in $(ls server/migrations/*.down.sql | tac); do
            docker compose exec -T postgres psql -U mm -d pinconsole -f /dev/stdin < "$f"
          done
          # 再跑 up,验证可重放
          for f in server/migrations/*.up.sql; do
            docker compose exec -T postgres psql -U mm -d pinconsole -f /dev/stdin < "$f"
          done
          # 再次验证表存在
          docker compose exec -T postgres psql -U mm -d pinconsole -c '\dt' | grep -E 'sessions|visitors|users'

      - name: 验证 server 启动自动应用 migrations (1k P0-14)
        env:
          SERVER_ENV: dev
          ADMIN_EMAIL: ci-admin@test.local
          ADMIN_PASSWORD: ci-strong-password-123
          PG_PASSWORD: mm_dev
          MINIO_ACCESS_KEY: mm_dev
          MINIO_SECRET_KEY: mm_dev_secret
        run: |
          # 重置 DB (模拟 fresh DB)
          docker compose exec -T postgres psql -U mm -d pinconsole -c "DROP SCHEMA public CASCADE; CREATE SCHEMA public;"
          # 构建 dev binary
          cd server && go build -tags dev -o /tmp/mm-server ./cmd/server
          # 启动 server (后台),应自动跑 migrations 创建表
          /tmp/mm-server &
          SERVER_PID=$!
          sleep 5
          # 验证表存在
          docker compose exec -T postgres psql -U mm -d pinconsole -c '\dt' | grep -E 'sessions|visitors|users|schema_migrations'
          # 验证 schema_migrations 表记录数 = migrations 数
          COUNT=$(docker compose exec -T postgres psql -U mm -d pinconsole -t -c "SELECT COUNT(*) FROM schema_migrations")
          if [ "$COUNT" -lt "4" ]; then
            echo "schema_migrations 记录数 $COUNT < 4,失败"
            kill $SERVER_PID || true
            exit 1
          fi
          kill $SERVER_PID 2>/dev/null || true
          wait $SERVER_PID 2>/dev/null || true

      - name: 清理
        if: always()
        run: docker compose down -v

  # ===== E2E (dev mode) =====
  # 1j 场景1 i18n 切换 + 全 13 旧 spec + 6 新 regression spec(dev mode)。
  # 1k/1l prod-mode gated 在 e2e-prod job 跑(本 job 默认 skip)。
  # 1j 场景2 docker-prod 改为 docker-e2e job 跑(本 job 默认 skip)。
  e2e-dev:
    name: Playwright e2e (dev mode)
    runs-on: ubuntu-latest
    needs: [go-check, js-check]
    env:
      SERVER_ENV: dev
      ADMIN_EMAIL: admin@pinconsole.local
      ADMIN_PASSWORD: ci-strong-password-123
      PG_PASSWORD: mm_dev
      MINIO_ACCESS_KEY: mm_dev
      MINIO_SECRET_KEY: mm_dev_secret
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: server/go.sum

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @pinconsole/e2e exec playwright install --with-deps chromium

      - name: Build frontend
        run: |
          pnpm --filter @pinconsole/admin build
          pnpm --filter @pinconsole/visitor-sdk build

      - name: Stage embed assets
        run: |
          rm -rf server/cmd/server/embedded/admin server/cmd/server/embedded/sdk server/cmd/server/embedded/landing
          mkdir -p server/cmd/server/embedded/admin server/cmd/server/embedded/sdk server/cmd/server/embedded/landing
          cp -r admin/dist/. server/cmd/server/embedded/admin/
          cp -r visitor-sdk/dist/. server/cmd/server/embedded/sdk/
          cp -r landing/. server/cmd/server/embedded/landing/

      - name: Build Go release binary
        run: cd server && CGO_ENABLED=0 go build -tags release -o bin/server ./cmd/server

      - name: Write .env
        run: |
          cat > .env <<EOF
          SERVER_ENV=dev
          ADMIN_EMAIL=admin@pinconsole.local
          ADMIN_PASSWORD=ci-strong-password-123
          PG_PASSWORD=mm_dev
          MINIO_ACCESS_KEY=mm_dev
          MINIO_SECRET_KEY=mm_dev_secret
          EOF

      - name: Start infra
        run: docker compose up -d postgres redis minio

      - name: Wait infra healthy
        run: |
          for i in {1..30}; do
            status=$(docker compose ps --format json | jq -r '.[] | select(.Service != "server") | .Health' | sort -u)
            if [ "$status" = "healthy" ]; then exit 0; fi
            sleep 2
          done
          echo "infra 未就绪"
          docker compose ps
          exit 1

      - name: Run e2e (dev mode)
        run: pnpm test:e2e
        env:
          CI: true
          SKIP_MM_WEBSERVER: "1"

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-dev-results
          path: |
            e2e/test-results/
            e2e/playwright-report/
          retention-days: 7

      - name: Cleanup
        if: always()
        run: docker compose down -v

  # ===== E2E (prod mode) =====
  # 1k/1l prod-mode gated tests 真跑。
  # SERVER_ENV=prod,真 bcrypt + 真 cookie 校验,无 dev bypass。
  e2e-prod:
    name: Playwright e2e (prod mode)
    runs-on: ubuntu-latest
    needs: e2e-dev
    env:
      SERVER_ENV: prod
      ADMIN_EMAIL: admin@pinconsole.local
      ADMIN_PASSWORD: ci-strong-password-123
      PG_PASSWORD: mm_dev
      MINIO_ACCESS_KEY: mm_dev
      MINIO_SECRET_KEY: mm_dev_secret
      MM_E2E_PROD: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: server/go.sum

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @pinconsole/e2e exec playwright install --with-deps chromium

      - name: Build frontend
        run: |
          pnpm --filter @pinconsole/admin build
          pnpm --filter @pinconsole/visitor-sdk build

      - name: Stage embed assets
        run: |
          rm -rf server/cmd/server/embedded/admin server/cmd/server/embedded/sdk server/cmd/server/embedded/landing
          mkdir -p server/cmd/server/embedded/admin server/cmd/server/embedded/sdk server/cmd/server/embedded/landing
          cp -r admin/dist/. server/cmd/server/embedded/admin/
          cp -r visitor-sdk/dist/. server/cmd/server/embedded/sdk/
          cp -r landing/. server/cmd/server/embedded/landing/

      - name: Build Go release binary
        run: cd server && CGO_ENABLED=0 go build -tags release -o bin/server ./cmd/server

      - name: Write .env (prod)
        run: |
          cat > .env <<EOF
          SERVER_ENV=prod
          ADMIN_EMAIL=admin@pinconsole.local
          ADMIN_PASSWORD=ci-strong-password-123
          PG_PASSWORD=mm_dev
          MINIO_ACCESS_KEY=mm_dev
          MINIO_SECRET_KEY=mm_dev_secret
          EOF

      - name: Start infra
        run: docker compose up -d postgres redis minio

      - name: Wait infra healthy
        run: |
          for i in {1..30}; do
            status=$(docker compose ps --format json | jq -r '.[] | select(.Service != "server") | .Health' | sort -u)
            if [ "$status" = "healthy" ]; then exit 0; fi
            sleep 2
          done
          exit 1

      - name: Run prod-mode gated e2e
        # 只跑含 "prod-mode" 的 describe(1k-prod 场景1 + 1l-prod × 2)
        run: pnpm --filter @pinconsole/e2e exec playwright test --grep "prod-mode"
        env:
          CI: true
          SKIP_MM_WEBSERVER: "1"
          MM_E2E_PROD: "1"

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-prod-results
          path: |
            e2e/test-results/
            e2e/playwright-report/
          retention-days: 7

      - name: Cleanup
        if: always()
        run: docker compose down -v

  # ===== Docker prod smoke (1j 场景2 replacement) =====
  # 1j 场景2 原本在 e2e-dev 里用 docker compose --profile prod up,但与外层
  # e2e 容器化冲突。改为独立 job,用 SERVER_PORT=8090 启 prod server 容器验证。
  docker-prod-smoke:
    name: docker-compose prod profile smoke
    runs-on: ubuntu-latest
    needs: [go-check, js-check]
    steps:
      - uses: actions/checkout@v4

      - name: Start infra + prod server (profile=prod)
        env:
          SERVER_PORT: "8090"
          SERVER_ENV: prod
          ADMIN_EMAIL: admin@pinconsole.local
          ADMIN_PASSWORD: ci-strong-password-123
          PG_PASSWORD: mm_dev
          MINIO_ACCESS_KEY: mm_dev
          MINIO_SECRET_KEY: mm_dev_secret
        run: |
          docker compose --profile prod up -d --build postgres redis minio server

      - name: Wait server healthy (max 180s)
        env:
          SERVER_PORT: "8090"
        run: |
          for i in {1..90}; do
            status=$(docker compose ps --format json | jq -r '.[] | .Health' | sort -u)
            if [ "$status" = "healthy" ]; then exit 0; fi
            sleep 2
          done
          echo "prod server 未就绪"
          docker compose ps
          docker compose logs server | tail -50
          exit 1

      - name: Verify prod server responds
        run: |
          curl -sS http://localhost:8090/healthz | grep -q '"status":"alive"' || exit 1
          curl -sS -o /dev/null -w "%{http_code}" http://localhost:8090/admin | grep -qE '^(200|307)$' || exit 1

      - name: Cleanup
        if: always()
        run: docker compose --profile prod down -v

