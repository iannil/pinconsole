name: Release

# 触发：推送 v* 格式的 tag（如 v0.1、v0.1.0）
# 版本号本身从仓库根的 VERSION 文件读取（单一事实源），
# CI 会校验 tag 与 VERSION 是否一致——不一致直接 fail。
#
# 不消费任何不可信输入（issue/PR 内容等），所有变量来自 git ref + VERSION 文件。
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build + Release + Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ===== 版本号一致性校验 =====
      # VERSION 是单一事实源；tag 仅作触发器。
      # tag 必须形如 `v<VERSION>`（如 VERSION=0.1 → tag=v0.1），否则 fail。
      - name: Verify tag matches VERSION file
        id: ver
        run: |
          set -euo pipefail
          VERSION=$(tr -d '[:space:]' < VERSION)
          TAG=${GITHUB_REF#refs/tags/}
          TAG_VERSION=${TAG#v}

          if [ -z "$VERSION" ]; then
            echo "::error::VERSION file is empty"
            exit 1
          fi
          if [ "$VERSION" != "$TAG_VERSION" ]; then
            echo "::error::VERSION file ('$VERSION') does not match git tag ('$TAG_VERSION). Expected tag: v$VERSION"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      # ===== Go 跨平台构建 =====
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: server/go.sum

      # ===== 前端构建（先于 Go release build，因为要 embed） =====
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Build admin + SDK
        run: |
          pnpm --filter @pinconsole/admin build
          pnpm --filter @pinconsole/visitor-sdk build

      - name: Stage frontend into embed path
        run: |
          mkdir -p server/cmd/server/embedded/admin
          mkdir -p server/cmd/server/embedded/sdk
          mkdir -p server/cmd/server/embedded/landing
          cp -r admin/dist/. server/cmd/server/embedded/admin/
          cp -r visitor-sdk/dist/. server/cmd/server/embedded/sdk/
          cp -r landing/. server/cmd/server/embedded/landing/

      - name: Build Linux amd64
        working-directory: server
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: amd64
        run: |
          go build \
            -ldflags="-s -w -X main.version=${{ steps.ver.outputs.version }} -X main.commit=${{ github.sha }}" \
            -tags release \
            -o ../dist/pinconsole-linux-amd64 \
            ./cmd/server

      - name: Build Linux arm64
        working-directory: server
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: arm64
        run: |
          go build \
            -ldflags="-s -w -X main.version=${{ steps.ver.outputs.version }} -X main.commit=${{ github.sha }}" \
            -tags release \
            -o ../dist/pinconsole-linux-arm64 \
            ./cmd/server

      - name: Build macOS arm64
        working-directory: server
        env:
          CGO_ENABLED: '0'
          GOOS: darwin
          GOARCH: arm64
        run: |
          go build \
            -ldflags="-s -w -X main.version=${{ steps.ver.outputs.version }} -X main.commit=${{ github.sha }}" \
            -tags release \
            -o ../dist/pinconsole-darwin-arm64 \
            ./cmd/server

      # ===== 压缩 + 校验和 =====
      - name: Archive binaries
        run: |
          cd dist
          for f in pinconsole-*; do
            tar -czf "$f.tar.gz" "$f"
            sha256sum "$f" > "$f.sha256"
            sha256sum "$f.tar.gz" > "$f.tar.gz.sha256"
          done

      # ===== GitHub Release =====
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.ver.outputs.version }}
          files: |
            dist/pinconsole-linux-amd64
            dist/pinconsole-linux-amd64.tar.gz
            dist/pinconsole-linux-amd64.sha256
            dist/pinconsole-linux-arm64
            dist/pinconsole-linux-arm64.tar.gz
            dist/pinconsole-linux-arm64.sha256
            dist/pinconsole-darwin-arm64
            dist/pinconsole-darwin-arm64.tar.gz
            dist/pinconsole-darwin-arm64.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true

      # ===== Docker 镜像（仅版本号 tag，无 latest / sha） =====
      - uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image name (lowercase)
        id: img
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "name=ghcr.io/${REPO_LOWER}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.img.outputs.name }}:${{ steps.ver.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
