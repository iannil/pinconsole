<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pinconsole · 访客 demo</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family: system-ui, -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
        max-width: 720px;
        margin: 4rem auto;
        padding: 0 1.5rem;
        line-height: 1.7;
        color: #1f2937;
      }
      h1 {
        font-size: 2rem;
        margin-bottom: 0.5rem;
      }
      .hint {
        padding: 1rem 1.25rem;
        background: #f0f9ff;
        border-left: 4px solid #0284c7;
        border-radius: 4px;
        font-family: ui-monospace, SFMono-Regular, monospace;
        font-size: 0.9rem;
        margin: 1.5rem 0;
      }
      form {
        margin-top: 2rem;
        padding: 1.5rem;
        background: #f9fafb;
        border-radius: 8px;
      }
      label {
        display: block;
        margin-bottom: 0.75rem;
      }
      input,
      textarea {
        display: block;
        width: 100%;
        padding: 0.5rem 0.75rem;
        font-size: 1rem;
        margin-top: 0.25rem;
        border: 1px solid #d1d5db;
        border-radius: 4px;
        font-family: inherit;
      }
      button {
        margin-top: 1rem;
        padding: 0.6rem 1.5rem;
        background: #2563eb;
        color: #fff;
        border: none;
        border-radius: 4px;
        font-size: 1rem;
        cursor: pointer;
      }
      button:hover {
        background: #1d4ed8;
      }
    </style>
  </head>
  <body>
    <h1>pinconsole 访客落地页（demo）</h1>
    <p>这是切片 1a 的占位落地页。访客访问此页时，SDK 会自动加载并连接后端。</p>
    <div class="hint">
      打开 DevTools Console，应该能看到：<br />
      [pinconsole] SDK loaded { version: '0.1.0', ... }
    </div>
    <form onsubmit="event.preventDefault(); alert('demo 表单（不实际提交）')">
      <h2>留下联系方式</h2>
      <label>
        姓名
        <input type="text" placeholder="张三" />
      </label>
      <label>
        手机
        <input type="tel" placeholder="13800138000" />
      </label>
      <label>
        备注
        <textarea placeholder="想咨询的内容" rows="3"></textarea>
      </label>
      <button type="submit">提交</button>
    </form>

    <!--
      切片 1a：SDK 由后端在 release 模式下从 /sdk.js 提供
      data-tenant-id / data-page-id 由 SDK 通过 script data-* 读取
    -->
    <script src="/sdk.js" data-tenant-id="demo" data-page-id="demo-home" data-debug="true"></script>
  </body>
</html>
